services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: scropids
      POSTGRES_USER: scropids
      POSTGRES_PASSWORD: scropids
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U scropids -d scropids"]
      interval: 10s
      timeout: 5s
      retries: 8

  redis:
    image: redis:7
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 10

  backend:
    build:
      context: ./backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             gunicorn scropids.wsgi:application --bind 0.0.0.0:8000 --workers 3 --timeout 120"
    env_file:
      - ./backend/.env
    environment:
      USE_SQLITE: "False"
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
      FRONTEND_ORIGIN: https://localhost
      CORS_ALLOWED_ORIGINS: https://localhost,http://localhost
      CSRF_TRUSTED_ORIGINS: https://localhost,http://localhost
      SESSION_COOKIE_SECURE: "False"
      CSRF_COOKIE_SECURE: "False"
      SECURE_SSL_REDIRECT: "False"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -fsS http://localhost:8000/api/v1/health/ || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

  worker:
    build:
      context: ./backend
    command: celery -A scropids worker --loglevel=info
    env_file:
      - ./backend/.env
    environment:
      USE_SQLITE: "False"
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      backend:
        condition: service_healthy

  beat:
    build:
      context: ./backend
    command: celery -A scropids beat --loglevel=info
    env_file:
      - ./backend/.env
    environment:
      USE_SQLITE: "False"
      POSTGRES_HOST: postgres
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/1
    depends_on:
      backend:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
    ports:
      - "80:80"
      - "443:443"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz | grep -q ok || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
