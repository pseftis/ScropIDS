services:
  - type: web
    name: scropids-backend
    env: python
    region: oregon
    buildCommand: "cd backend && pip install -r requirements.txt && python manage.py migrate"
    startCommand: "cd backend && gunicorn scropids.wsgi:application"
    envVars:
      - key: DJANGO_SECRET_KEY
        generateValue: true
      - key: DJANGO_DEBUG
        value: "False"
      - key: DATABASE_URL
        fromDatabase:
          name: scropids-pg
          property: connectionString
      - key: FRONTEND_ORIGIN
        value: "https://your-vercel-project.vercel.app"
      - key: USE_SQLITE
        value: "False"
      - key: CELERY_TASK_ALWAYS_EAGER
        value: "True"

  - type: psql
    name: scropids-pg
    plan: free
    region: oregon
